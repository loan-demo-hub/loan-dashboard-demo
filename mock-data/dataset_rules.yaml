complaint_tendency:
  levels:
    - 低
    - 中
    - 高
  action_map:
    - level: 低
      action: 按常规催收节奏跟进，语气温和专业，完整留存通话录音即可。
    - level: 中
      action: 联系前复核话术合规性，避免高频打扰；优先短信与单次电话，预留客服升级通道。
    - level: 高
      action: 升级至投诉敏感队列，须主管审核后再联系；禁用威胁性措辞，准备监管报备材料。

recommended_action_category:
  allowed:
    - soft_reminder
    - payment_nudge
    - negotiation
    - warning_notice
    - escalation
    - legal_warning
    - field_follow_up
  # Portfolio target: 40% early touch · 25% negotiation · 20% warning · 10% escalation · 5% legal/field
  global_weights:
    - id: soft_reminder
      weight: 22
    - id: payment_nudge
      weight: 18
    - id: negotiation
      weight: 25
    - id: warning_notice
      weight: 20
    - id: escalation
      weight: 10
    - id: legal_warning
      weight: 3
    - id: field_follow_up
      weight: 2
  overdue_affinity:
    - max_overdue: 9
      multipliers:
        soft_reminder: 3.2
        payment_nudge: 2.6
        negotiation: 0.45
        warning_notice: 0.18
        escalation: 0.07
        legal_warning: 0.04
        field_follow_up: 0.04
    - max_overdue: 30
      multipliers:
        soft_reminder: 1.4
        payment_nudge: 1.9
        negotiation: 2.4
        warning_notice: 0.75
        escalation: 0.28
        legal_warning: 0.1
        field_follow_up: 0.08
    - max_overdue: 60
      multipliers:
        soft_reminder: 0.55
        payment_nudge: 0.85
        negotiation: 1.15
        warning_notice: 2.1
        escalation: 1.7
        legal_warning: 0.45
        field_follow_up: 0.35
    - max_overdue: 999
      multipliers:
        soft_reminder: 0.2
        payment_nudge: 0.35
        negotiation: 0.65
        warning_notice: 1.4
        escalation: 2.6
        legal_warning: 2.2
        field_follow_up: 1.9
